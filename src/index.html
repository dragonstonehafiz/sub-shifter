<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subtitle Shifter</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Subtitle Shifter</h1>
        </header>

        <main>
            <h2 style="text-align: center;">Tools</h2>

            <div class="tools-section">
                <div class="tools-subsection">
                    <h3>Shift</h3>
                    <div class="content-row">
                        <label>Upload File:</label>
                        <input type="file" id="shift-file" accept=".ass,.srt" required>
                    </div>
                    <div class="content-row">
                        <label>Shift by:</label> 
                        <input class="num-input" id="shift-value" type="text" value="-1.00">
                        <div class="tooltip">?
                            <span class="tooltip-text">Shift all subtitles forward or backward by the specified number of seconds</span>
                        </div>
                    </div>
                    <div class="content-row">
                        <button id="shift-button" disabled>Shift</button>
                    </div>
                </div>

                <div class="tools-subsection">
                    <h3>Convert</h3>
                    <div class="content-row">
                        <label>Upload File:</label>
                        <input type="file" id="convert-file" accept=".ass,.srt" required>
                    </div>
                    <div class="content-row">
                        <button id="convert-button" disabled>Convert</button>
                    </div>
                </div>
            </div>

        </main>

        <footer>
            <div>
                This site was created to practice basic frontend programming and is a copy of this <a href="https://subshifter.bitsnbites.eu/">site</a>.
                <br>
                Source code can be found <a href="https://github.com/dragonstonehafiz/sub-shifter">here</a>.
            </div>
        </footer>

        <script src="scripts/shared.js"></script>
        <script src="scripts/srt.js"></script>
        <script src="scripts/ass.js"></script>
        <script src="scripts/shift.js"></script>
        <script src="scripts/convert.js"></script>
    </body>
</html>
