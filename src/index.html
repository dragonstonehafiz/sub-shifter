<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subtitle Shifter</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Subtitle Shifter</h1>
        </header>

        <main>
            <h2 style="text-align: center;">Tools</h2>

            <div class="tools-section">
                <div class="tools-subsection">
                    <h3>Shift</h3>
                    <div class="content-row">
                        <label>Upload File:</label>
                        <input type="file">
                    </div>
                    <div class="content-row">
                        <label>Shift by:</label>
                        <input type="text" value="-1.0">
                        <button>Shift</button>
                    </div>
                </div>

                <div class="tools-subsection">
                    <h3>Convert</h3>
                    <div class="content-row">
                        <label>Upload File:</label>
                        <input type="file">
                    </div>
                    <div class="content-row">
                        <button>Convert</button>
                    </div>
                </div>
            </div>

            

        </main>

        <footer>
            <div>This site was created by Muhd Hafiz</div>
        </footer>
    </body>
</html>
